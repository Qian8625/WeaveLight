# Basic directory configuration — modify this to your local path

## *** IMPORTANT **** Replace OpenEarthAgent with full path /home/../OpenEarthAgent/ in complete config
base_dir: /home/ubuntu/01_Code/OpenEarthAgent/tool_server/tool_workers
log_folder: /home/ubuntu/01_Code/OpenEarthAgent/tool_server/tool_workers/logs/server_log
tools_output_dir: /home/ubuntu/01_Code/OpenEarthAgent/tool_server/tool_workers/tools_output

# These parameters won’t be used in the local configuration, but are kept to maintain a consistent structure
default_calculate_gpus: 1
default_calculate_cpus: 16
default_control_cpus: 2
default_control_gpus: 0
retry_interval: 1
request_timeout: 10

# Controller configuration
controller_config:
  worker_name: controller
  job_name: controller
  calculate_type: control
  controller_addr_location: /home/ubuntu/01_Code/OpenEarthAgent/tool_server/tool_workers/online_workers/controller_addr/controller_addr.json # location to save controller addr
  cmd:
    script-addr: /home/ubuntu/01_Code/OpenEarthAgent/tool_server/tool_workers/online_workers/controller.py
    port: 20001
    host: "0.0.0.0"
  # Optional: specify the conda environment
  # conda_env: "your_env_name"
  # cuda_visible_devices: "0"

