compute_environment: LOCAL_MACHINE
deepspeed_config:
  fp16:
    enabled: false
  bf16:
    enabled: true
  zero_optimization:
    stage: 0
    offload_param:
      device: none
    overlap_comm: false
    contiguous_gradients: false
    reduce_scatter: false
  activation_checkpointing:
    partition_activations: false
  aio:
    block_size: 1048576
    queue_depth: 8
    overlap_events: true
    single_submit: false
    thread_count: 2
  wall_clock_breakdown: false
distributed_type: NO
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
main_process_port: 29500
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false